<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");
const menu = document.getElementById("menu");

let bird, pipes, frame, score, gravity, velocity, gameRunning;

function reset(){
bird = {x:80, y:300, r:18};
pipes = [];
frame = 0;
score = 0;
gravity = 0.5;
velocity = 0;
gameRunning = false;

ui.innerText = "0";
}

function startGame(){
reset();
gameRunning = true;
menu.style.display = "none";
loop();
}

document.addEventListener("keydown", jump);
document.addEventListener("click", jump);

function jump(){
if(!gameRunning) return;
velocity = -8;
}

function drawBird(){
ctx.fillStyle="yellow";
ctx.beginPath();
ctx.arc(bird.x,bird.y,bird.r,0,Math.PI*2);
ctx.fill();
}

function drawPipes(){
for(let p of pipes){
ctx.fillStyle="green";
ctx.fillRect(p.x,0,60,p.top);
ctx.fillRect(p.x,p.top+150,60,700);
}
}

function updatePipes(){
if(frame % 90 === 0){
let top = Math.random()*300 + 100;
pipes.push({x:420, top:top});
}

for(let i=0;i<pipes.length;i++){
let p = pipes[i];
p.x -= 2;

// collision
if(bird.x+bird.r > p.x && bird.x-bird.r < p.x+60){
if(bird.y-bird.r < p.top || bird.y+bird.r > p.top+150){
gameOver();
}
}

if(p.x + 60 < 0){
pipes.splice(i,1);
score++;
ui.innerText = score;
}
}
}

function gameOver(){
gameRunning = false;
menu.style.display = "block";
menu.innerHTML = 
Game Over<br>
Score: ${score}<br><br>
<button onclick="startGame()">دوباره</button>
;
}

function loop(){
if(!gameRunning) return;

ctx.clearRect(0,0,canvas.width,canvas.height);

velocity += gravity;
bird.y += velocity;

if(bird.y > 680 || bird.y < 0){
gameOver();
}

drawBird();
drawPipes();
updatePipes();

frame++;
requestAnimationFrame(loop);
}

reset();
</script>
