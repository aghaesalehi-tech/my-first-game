<!DOCTYPE html>
<html lang="fa">
<head><link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Chicken Online</title>

<style>
body{
margin:0;
background:linear-gradient(#4EC0CA,#1b9aaa);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:tahoma;
overflow:hidden;
}

canvas{
background:linear-gradient(#70d6ff,#c2f5ff);
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

#ui{
position:absolute;
top:15px;
font-size:32px;
color:white;
text-shadow:2px 2px 5px black;
}

#menu{
position:absolute;
text-align:center;
color:white;
font-size:24px;
text-shadow:2px 2px 5px black;
}

button{
padding:10px 20px;
font-size:16px;
border:none;
border-radius:10px;
background:#ffd43b;
cursor:pointer;
}

#board{
position:absolute;
right:10px;
top:10px;
color:white;
font-size:14px;
text-align:left;
text-shadow:1px 1px 3px black;
}
</style>
</head>

<body>

<div id="ui">0 | 0</div>

<div id="menu">
🐔 Flappy Chicken Online<br><br>
<button id="startBtn">شروع بازی</button>
</div>

<div id="board"></div>

<canvas id="game" width="420" height="700"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");
const menu = document.getElementById("menu");
const board = document.getElementById("board");

let startBtn;

let bird, pipes, frame, score, gravity, velocity, running;
let best = localStorage.getItem("best") || 0;

// 🔥 Firebase URL (اینو باید خودت جایگزین کنی)
const FIREBASE_URL = "https://YOUR-FIREBASE.firebaseio.com/scores.json";

window.onload = function(){
startBtn = document.getElementById("startBtn");
startBtn.onclick = start;

init();

document.addEventListener("keydown", jump);
document.addEventListener("click", jump);

loadBoard();
};

function init(){
bird = {x:80,y:300,r:18};
pipes = [];
frame = 0;
score = 0;
gravity = 0.5;
velocity = 0;
running = false;

ui.innerText = score + " | " + best;
}

function start(){
init();
running = true;
menu.style.display = "none";
loop();
}

function jump(){
if(!running) return;
velocity = -8;
}

function drawBird(){
ctx.font = "30px serif";
ctx.fillText("🐔", bird.x - 15, bird.y + 10);
}

function drawPipes(){
ctx.fillStyle="green";
for(let p of pipes){
ctx.fillRect(p.x,0,60,p.top);
ctx.fillRect(p.x,p.top+150,60,700);
}
}

function updatePipes(){
if(frame % 85 === 0){
pipes.push({x:420, top:Math.random()*280+100});
}

for(let i=0;i<pipes.length;i++){
let p = pipes[i];
p.x -= 2.2;

if(bird.x+20 > p.x && bird.x < p.x+60){
if(bird.y < p.top || bird.y > p.top+150){
gameOver();
}
}

if(p.x+60 < 0){
pipes.splice(i,1);
score++;
ui.innerText = score + " | " + best;
}
}
}

function gameOver(){

running = false;

// local best
if(score > best){
best = score;
localStorage.setItem("best", best);
}

// send to firebase (online leaderboard)
fetch(FIREBASE_URL,{
method:"POST",
body:JSON.stringify({
score:score,
time:Date.now()
})
});

ui.innerText = score + " | " + best;

menu.style.display = "block";
menu.innerHTML = 
Game Over<br>
Score: ${score}<br>
Best: ${best}<br><br>
<button id="startBtn">دوباره</button>
;

setTimeout(()=>{
document.getElementById("startBtn").onclick = start;
},100);

// refresh leaderboard
loadBoard();
}

function loadBoard(){
fetch(FIREBASE_URL)
.then(r=>r.json())
.then(data=>{
if(!data) return;

let arr = Object.values(data);
arr.sort((a,b)=>b.score-a.score);
arr = arr.slice(0,5);

board.innerHTML = "<b>🏆 Top 5</b><br>";

arr.forEach((s,i)=>{
board.innerHTML += ${i+1}. ${s.score}<br>;
});
});
}

function loop(){
if(!running) return;

ctx.clearRect(0,0,canvas.width,canvas.height);

velocity += gravity;
bird.y += velocity;

if(bird.y > 680 || bird.y < 0){
gameOver();
}

drawBird();
drawPipes();
updatePipes();

frame++;
requestAnimationFrame(loop);
}

</script>
<script src="firebase.js"></script>
<script src="game.js"></script>
</body>
</html>
