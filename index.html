<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Pro</title>

<style>
body{
margin:0;
background:linear-gradient(#4EC0CA,#1b9aaa);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:tahoma;
overflow:hidden;
}

canvas{
background:linear-gradient(#70d6ff,#c2f5ff);
border-radius:15px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

#ui{
position:absolute;
top:20px;
font-size:40px;
color:white;
text-shadow:2px 2px 5px black;
}

#menu{
position:absolute;
text-align:center;
color:white;
font-size:30px;
text-shadow:2px 2px 5px black;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:#ffd43b;
cursor:pointer;
}
</style>
</head>

<body>

<div id="ui">0 | 0</div>

<div id="menu">
Flappy Pro<br><br>
<button id="startBtn">شروع بازی</button>
</div>

<canvas id="game" width="420" height="700"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const ui = document.getElementById("ui");
const menu = document.getElementById("menu");

let startBtn;

let bird, pipes, frame, score, gravity, velocity, running;
let best = localStorage.getItem("best") || 0;

function init(){
bird = {x:80,y:300,r:18};
pipes = [];
frame = 0;
score = 0;
gravity = 0.5;
velocity = 0;
running = false;

ui.innerText = score + " | " + best;

startBtn = document.getElementById("startBtn");
startBtn.onclick = start;
}

function start(){
init();
running = true;
menu.style.display = "none";
loop();
}

document.addEventListener("keydown", jump);
document.addEventListener("click", jump);

function jump(){
if(!running) return;
velocity = -8;
}

function drawBird(){
ctx.fillStyle="yellow";
ctx.shadowColor="rgba(0,0,0,0.3)";
ctx.shadowBlur=10;

ctx.beginPath();
ctx.arc(bird.x,bird.y,bird.r,0,Math.PI*2);
ctx.fill();

ctx.shadowBlur=0;
}

function drawPipes(){
ctx.fillStyle="green";
for(let p of pipes){
ctx.fillRect(p.x,0,60,p.top);
ctx.fillRect(p.x,p.top+150,60,700);
}
}

function updatePipes(){
if(frame % 85 === 0){
pipes.push({x:420, top:Math.random()*280+100});
}

for(let i=0;i<pipes.length;i++){
let p = pipes[i];
p.x -= 2.2;

if(bird.x+bird.r > p.x && bird.x-bird.r < p.x+60){
if(bird.y-bird.r < p.top || bird.y+bird.r > p.top+150){
gameOver();
}
}

if(p.x + 60 < 0){
pipes.splice(i,1);
score++;
ui.innerText = score + " | " + best;
}
}
}

function gameOver(){

running = false;

// save best
if(score > best){
best = score;
localStorage.setItem("best", best);
}

ui.innerText = score + " | " + best;

menu.style.display = "block";
menu.innerHTML = 
Game Over<br>
Score: ${score}<br>
Best: ${best}<br><br>
<button id="startBtn">دوباره</button>
;

setTimeout(()=>{
document.getElementById("startBtn").onclick = start;
},50);
}

function loop(){
if(!running) return;

ctx.clearRect(0,0,canvas.width,canvas.height);

velocity += gravity;
bird.y += velocity;

if(bird.y > 680 || bird.y < 0){
gameOver();
}

drawBird();
drawPipes();
updatePipes();

frame++;
requestAnimationFrame(loop);
}

init();
</script>

</body>
</html>
